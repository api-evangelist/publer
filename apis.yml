aid: publer
url: https://raw.githubusercontent.com/api-evangelist/publer/refs/heads/main/apis.yml
name: Publer
kind: company
description: Publer is a social-media scheduling and management platform for planning,
  creating, and publishing content across networks like Facebook, Instagram, X,
  LinkedIn, TikTok, YouTube, Pinterest, and more. The Publer API (v1) lets Business
  customers programmatically schedule and publish posts, manage connected social
  accounts and workspaces, work with media libraries, and track asynchronous jobs.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Social Media
- Scheduling
- Publishing
- Content Management
- Marketing
created: '2026-06-25'
modified: '2026-06-25'
specificationVersion: '0.19'
apis:
- aid: publer:posts-scheduling
  name: Publer Posts & Scheduling API
  tags:
  - Posts
  - Scheduling
  - Publishing
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://publer.com/docs/api-reference/posts
  baseURL: https://app.publer.com/api/v1
  properties:
  - url: https://publer.com/docs/api-reference/posts
    type: Documentation
  - url: https://publer.com/docs/posting/create-posts
    type: APIReference
  - url: openapi/publer-openapi.yml
    type: OpenAPI
  - url: collections/publer.postman_collection.json
    type: PostmanCollection
  - url: collections/publer.opencollection.json
    type: OpenCollection
  description: List, filter, and search posts, then schedule posts for future
    publication (including drafts) or publish content immediately across connected
    social networks. Scheduling and publishing run asynchronously and return a
    job id.
