  baseURL: https://app.publer.com/api/v1
  properties:
  - url: https://publer.com/docs/api-reference/accounts
    type: Documentation
  - url: openapi/publer-openapi.yml
    type: OpenAPI
  - url: collections/publer.postman_collection.json
    type: PostmanCollection
  - url: collections/publer.opencollection.json
    type: OpenCollection
  description: Retrieve the list of connected social media accounts available in
    the selected workspace across providers such as Facebook, Instagram, X,
    LinkedIn, TikTok, YouTube, Pinterest, Bluesky, Threads, Mastodon, and more.
