meters:
- name: subscription
  description: Recurring subscription charge for the selected plan tier (Professional or Business).
  unit: subscription
  aggregation: sum
  dimensions:
  - workspace
  - plan
- name: social_accounts
  description: Number of connected social accounts billed per account beyond the included base.
  unit: accounts
  aggregation: sum
  dimensions:
  - workspace
  - plan
- name: team_members
  description: Number of additional team members billed per member beyond the included base.
  unit: members
  aggregation: sum
  dimensions:
  - workspace
  - plan
principles:
- name: Visibility
  description: Track the Publer subscription tier, connected account count, and member count per workspace.
- name: Allocation
  description: Map each workspace and its connected accounts to the owning team or client for chargeback.
- name: Optimization
  description: Right-size connected accounts and members; choose annual billing for the ~20% discount; consolidate workspaces where possible.
- name: Accountability
  description: Assign an owner per workspace and review subscription and per-account spend against budget.
