description: >-
  FinOps view of Publer spend. Publer is billed as a recurring SaaS
  subscription (Free, Professional, Business) priced per connected social
  account and per team member, rather than per-API-call. The Publer API is
  available exclusively to Business subscribers, so API-driven workloads carry
  the Business subscription cost plus any incremental per-account and
  per-member charges; annual billing is discounted versus monthly.
notes: >-
  Publer does not publish usage-based per-API-call pricing; cost is driven by
  subscription tier, number of social accounts, and team members. Verify
  current rates and the Business-tier API requirement on the Publer pricing
  page during reconciliation.
